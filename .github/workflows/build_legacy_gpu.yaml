name: build legacy gpu


on:
  # push:
  #   tags:
  #     - 'v0.7.*'
  workflow_dispatch:


jobs:


  linux-intel-cu11x:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cuda-version: ['113', '121']
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/share/chromium
          docker system prune -af
      - uses: actions/checkout@v6
        with:
          ref: legacy
      - name: Build wheel cu${{ matrix.cuda-version }}
        env:
          CUDA_VERSION: ${{ matrix.cuda-version }}
          BUILD_IMAGE: ratharog/manylinux_2_28_x86_64:cu${{ matrix.cuda-version }}
          BUILD_PYTHON_VERSIONS: "['${{ matrix.python-version }}']"
        if: |
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags') && env.CUDA_VERSION != '') || 
          env.CUDA_VERSION == '121'
        run: |
          # clone nvidia cuda cccl to cumm/third_party/cccl
          # ctk-cccl mapping: https://github.com/NVIDIA/cccl#mapping-to-ctk-versions
          if [ -n "$CUDA_VERSION" ]; then
            if (( CUDA_VERSION >= 126 )); then
              echo "Unexpected CUDA_VERSION: $CUDA_VERSION in build legacy. Use main branch instead." >&2
              exit 1
            elif (( CUDA_VERSION >= 124 )); then
              if [ "$CUDA_VERSION" == "124" ]; then
                CCCL_BRANCH_NAME="2.3.2"
              elif [ "$CUDA_VERSION" == "125" ]; then
                CCCL_BRANCH_NAME="2.4.0"
              else
                echo "Unexpected CUDA_VERSION: $CUDA_VERSION" >&2
                exit 1
              fi
              git clone https://github.com/NVIDIA/cccl.git third_party/cccl -b v$CCCL_BRANCH_NAME
            fi
            # cccl is not needed for CUDA_VERSION < 124
          fi
          docker run --rm \
            -e CUMM_CUDA_VERSION="$CUDA_VERSION" \
            -e BUILD_PYTHON_VERSIONS="$BUILD_PYTHON_VERSIONS" \
            -v "$(pwd)":/io \
            $BUILD_IMAGE \
            bash -c "source /etc/bashrc && /io/tools/build-wheels.sh"
      - name: Archive wheels
        uses: actions/upload-artifact@v7
        with:
          name: linux-intel-cu${{ matrix.cuda-version }}--py${{ matrix.python-version }}
          path: dist/*.whl

